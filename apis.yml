aid: foot-locker
name: Foot Locker
description: >-
  Foot Locker is a global retailer of athletic footwear and apparel, operating
  stores under banners including Foot Locker, Kids Foot Locker, Lady Foot
  Locker, Champs Sports, Eastbay, and Footaction. Foot Locker does not
  publish a public developer portal or open API. Integrations with Foot
  Locker (loyalty, gift cards, retail media, e-commerce affiliate, supplier
  EDI) are arranged through partner programs and require commercial
  agreements.
